<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vessel Config Editor</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-primary: #ffffff; --bg-secondary: #f5f5f4; --bg-tertiary: #eeede9;
  --text-primary: #1a1a18; --text-secondary: #5f5e5a; --text-tertiary: #888780;
  --border: rgba(0,0,0,0.12); --border-strong: rgba(0,0,0,0.22);
  --accent: #185fa5; --accent-bg: #e6f1fb;
  --success: #0f6e56; --success-bg: #e1f5ee;
  --danger: #e24b4a;
  --radius-md: 8px; --radius-lg: 12px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg-primary: #1c1c1a; --bg-secondary: #252523; --bg-tertiary: #2e2e2c;
    --text-primary: #f0ede8; --text-secondary: #a8a7a2; --text-tertiary: #6a6966;
    --border: rgba(255,255,255,0.1); --border-strong: rgba(255,255,255,0.2);
    --accent: #74b9ff; --accent-bg: #0c2a44;
    --success: #5dcaa5; --success-bg: #04342c;
    --danger: #f09595;
  }
}
body { font-family: var(--font); background: var(--bg-tertiary); color: var(--text-primary); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
.topbar { background: var(--bg-primary); border-bottom: 0.5px solid var(--border); padding: 9px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.topbar h1 { font-size: 15px; font-weight: 500; white-space: nowrap; }
.meta-inline { display: flex; align-items: center; gap: 6px; flex: 1; }
.meta-inline label { font-size: 11px; color: var(--text-secondary); white-space: nowrap; }
.meta-inline input { padding: 5px 8px; border: 0.5px solid var(--border-strong); border-radius: var(--radius-md); background: var(--bg-secondary); color: var(--text-primary); font-size: 12px; }
#caseId { width: 80px; }
#baseDir { flex: 1; min-width: 140px; }
.main { display: grid; grid-template-columns: 1fr 370px; flex: 1; overflow: hidden; }
.viewer-panel { display: flex; flex-direction: column; background: var(--bg-secondary); overflow: hidden; }
.viewer-bar { padding: 8px 12px; background: var(--bg-primary); border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 8px; }
.file-pick-btn { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border: 0.5px solid var(--border-strong); border-radius: var(--radius-md); background: var(--bg-secondary); color: var(--text-primary); cursor: pointer; font-size: 12px; font-family: var(--font); white-space: nowrap; transition: background 0.12s; }
.file-pick-btn:hover { background: var(--bg-tertiary); }
.loaded-name { font-size: 12px; color: var(--success); font-family: var(--font-mono); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 320px; }
.viewer-area { flex: 1; position: relative; overflow: hidden; }
#viewer { width: 100%; height: 100%; border: none; display: none; }
.placeholder { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--text-secondary); }
.placeholder svg { width: 52px; height: 52px; color: var(--text-tertiary); }
.placeholder p { font-size: 14px; }
.placeholder small { font-size: 12px; color: var(--text-tertiary); text-align: center; max-width: 300px; line-height: 1.6; }
/* incoming flash */
@keyframes flashGreen { 0%,100% { background: var(--bg-secondary); } 30% { background: var(--success-bg); } }
.seg-row.flash { animation: flashGreen 0.7s ease; }
/* side panel */
.side-panel { display: flex; flex-direction: column; border-left: 0.5px solid var(--border); background: var(--bg-primary); overflow: hidden; }
.side-header { padding: 11px 14px 9px; border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
.side-header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 3px; }
.side-header h2 { font-size: 14px; font-weight: 500; }
.side-header p { font-size: 12px; color: var(--text-secondary); }
.click-hint { font-size: 11px; color: var(--success); margin-top: 3px; display: none; }
.scan-tabs { display: flex; border-bottom: 0.5px solid var(--border); flex-shrink: 0; overflow-x: auto; }
.scan-tab { flex-shrink: 0; padding: 8px 14px; font-size: 12px; font-weight: 500; border: none; background: transparent; color: var(--text-secondary); cursor: pointer; border-bottom: 2px solid transparent; font-family: var(--font); }
.scan-tab.active { color: var(--text-primary); border-bottom-color: var(--accent); }
.scan-content { flex: 1; overflow-y: auto; padding: 10px 12px; }
input, button, select { font-family: var(--font); }
.form-group { margin-bottom: 8px; }
.form-group label { display: block; font-size: 11px; color: var(--text-secondary); margin-bottom: 3px; }
.form-group .input-row { display: flex; gap: 5px; align-items: center; }
.form-group input { width: 100%; padding: 5px 8px; border: 0.5px solid var(--border-strong); border-radius: var(--radius-md); background: var(--bg-secondary); color: var(--text-primary); font-size: 12px; }
.form-group input::placeholder { color: var(--text-tertiary); }
.scan-name-row { display: flex; gap: 6px; align-items: center; margin-bottom: 8px; }
.scan-name-row label { font-size: 11px; color: var(--text-secondary); white-space: nowrap; }
.scan-name-row input { flex: 1; padding: 5px 8px; border: 0.5px solid var(--border-strong); border-radius: var(--radius-md); background: var(--bg-secondary); color: var(--text-primary); font-size: 12px; }
.autofill-btn { padding: 4px 9px; font-size: 11px; white-space: nowrap; border: 0.5px solid var(--border-strong); border-radius: var(--radius-md); background: var(--accent-bg); color: var(--accent); cursor: pointer; flex-shrink: 0; }
.divider { font-size: 11px; font-weight: 500; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; margin: 10px 0 6px; display: flex; align-items: center; gap: 8px; }
.divider::after { content: ''; flex: 1; height: 0.5px; background: var(--border); }
.col-headers { display: grid; grid-template-columns: 1fr 110px 32px 32px 22px; gap: 4px; padding: 0 2px; margin-bottom: 4px; }
.col-headers span { font-size: 10px; color: var(--text-tertiary); text-align: center; }
.col-headers span:first-child { text-align: left; }
.seg-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
.seg-row { display: grid; grid-template-columns: 1fr 110px 32px 32px 22px; gap: 4px; align-items: center; background: var(--bg-secondary); border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 6px 7px; transition: background 0.2s; }
.seg-row input { padding: 3px 5px; border: 0.5px solid var(--border); border-radius: 5px; background: var(--bg-primary); color: var(--text-primary); width: 100%; font-size: 11px; }
.seg-row input:first-child { font-family: var(--font-mono); font-size: 10px; }
.seg-row input[type=number] { text-align: center; }
.seg-row select { padding: 3px 4px; border: 0.5px solid var(--border); border-radius: 5px; background: var(--bg-primary); color: var(--text-primary); font-size: 11px; width: 100%; cursor: pointer; }
.add-row { display: flex; gap: 5px; margin-bottom: 4px; }
.add-row input { flex: 1; padding: 5px 8px; border: 0.5px solid var(--border-strong); border-radius: var(--radius-md); background: var(--bg-secondary); color: var(--text-primary); font-family: var(--font-mono); font-size: 11px; }
.add-row input::placeholder { color: var(--text-tertiary); font-family: var(--font); }
button { padding: 5px 12px; border: 0.5px solid var(--border-strong); border-radius: var(--radius-md); background: transparent; color: var(--text-primary); cursor: pointer; transition: background 0.12s; }
button:hover { background: var(--bg-secondary); }
button:active { transform: scale(0.98); }
.btn-icon { padding: 3px 5px; border: none; background: none; color: var(--text-tertiary); cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 4px; }
.btn-icon:hover { color: var(--danger); }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 500; }
.btn-primary:hover { opacity: 0.9; background: var(--accent); }
.tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: var(--accent-bg); color: var(--accent); font-weight: 500; }
.bottom-bar { padding: 10px 12px; border-top: 0.5px solid var(--border); flex-shrink: 0; display: flex; flex-direction: column; gap: 7px; }
.save-row { display: flex; gap: 6px; }
.save-row button { flex: 1; padding: 7px; font-size: 13px; font-weight: 500; }
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(60px); background: var(--text-primary); color: var(--bg-primary); padding: 8px 18px; border-radius: var(--radius-md); font-size: 13px; opacity: 0; transition: transform 0.2s, opacity 0.2s; pointer-events: none; z-index: 999; }
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>
</head>
<body>

<div class="topbar">
  <h1>Vessel Config Editor</h1>
  <div class="meta-inline">
    <label>Case ID</label>
    <input id="caseId" placeholder="250701" value="250701" />
    <label>Base dir</label>
    <input id="baseDir" placeholder="/v/ai/nobackup/cni/chang_data/250701_960" />
  </div>
</div>

<div class="main">
  <div class="viewer-panel">
    <div class="viewer-bar">
      <button class="file-pick-btn" onclick="pickHtmlFile()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
        Open vessel_graph_3d.html
      </button>
      <span class="loaded-name" id="loadedName" style="display:none"></span>
    </div>
    <div class="viewer-area">
      <div class="placeholder" id="placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <circle cx="5" cy="5" r="2"/><circle cx="19" cy="5" r="2"/><circle cx="12" cy="19" r="2"/>
          <line x1="7" y1="5" x2="17" y2="5"/>
          <line x1="5" y1="7" x2="11" y2="17"/>
          <line x1="19" y1="7" x2="13" y2="17"/>
        </svg>
        <p>No file loaded yet</p>
        <small>Open vessel_graph_3d.html above, then click a segment in the legend to add it automatically.</small>
      </div>
      <iframe id="viewer" title="3D vessel graph viewer"></iframe>
    </div>
  </div>

  <div class="side-panel">
    <div class="side-header">
      <div class="side-header-row">
        <h2>Segment annotation</h2>
        <button onclick="addScan()" style="font-size:11px;padding:3px 9px">+ scan</button>
      </div>
      <p>Click a segment in the 3D viewer legend to add it here</p>
      <p class="click-hint" id="clickHint">✓ Viewer connected — click any segment in the legend</p>
    </div>
    <div class="scan-tabs" id="scanTabs"></div>
    <div class="scan-content" id="scanContent"></div>
    <div class="bottom-bar">
      <div class="save-row">
        <button class="btn-primary" onclick="saveConfig()">↓ Save config JSON</button>
        <button onclick="copyConfig()" style="max-width:90px">Copy JSON</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="htmlFilePicker" accept=".html" style="display:none" onchange="onHtmlPicked(event)" />
<input type="file" id="matFilePicker" accept=".mat" style="display:none" onchange="onMatPicked(event)" />
<input type="file" id="outFolderPicker" style="display:none" webkitdirectory onchange="onFolderPicked(event)" />

<script>
const VESSEL_NAMES = [
  '', 'A1_L','A1_R','M1_L','M1_R','M2_L','M2_R','M3_L','M3_R',
  'P1_L','P1_R','P2_L','P2_R','BA','ICA_L','ICA_R','other'
];

let scans = [{ name: 's1', matFile: '', outputFolder: '', segments: [] }];
let activeScan = 0;
let pendingMatCb = null, pendingFolderCb = null;

function showToast(msg, duration) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration || 2400);
}

function esc(s) {
  return (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── postMessage listener ── */
window.addEventListener('message', e => {
  if (!e.data || e.data.type !== 'segmentSelected') return;
  const segId = e.data.segId;
  // Check if already added in active scan
  const already = scans[activeScan].segments.some(s => s.id === segId);
  if (already) {
    showToast('Already added: ' + segId);
    flashRow(segId);
    return;
  }
  scans[activeScan].segments.push({ id: segId, name: '', trimStart: 3, trimEnd: 3 });
  render();
  showToast('Added: ' + segId, 1600);
  flashRow(segId);
});

function flashRow(segId) {
  setTimeout(() => {
    const rows = document.querySelectorAll('.seg-row');
    rows.forEach(row => {
      const inp = row.querySelector('input');
      if (inp && inp.value === segId) {
        row.classList.add('flash');
        setTimeout(() => row.classList.remove('flash'), 800);
        // focus name select
        const sel = row.querySelector('select');
        if (sel) sel.focus();
      }
    });
  }, 60);
}

/* ── file picking ── */
function pickHtmlFile() {
  document.getElementById('htmlFilePicker').click();
}

function onHtmlPicked(e) {
  const file = e.target.files[0];
  if (!file) return;
  const url    = URL.createObjectURL(file);
  const iframe = document.getElementById('viewer');
  iframe.src   = url;
  iframe.style.display = 'block';
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('loadedName').style.display  = 'inline';
  document.getElementById('loadedName').textContent    = file.name;
  document.getElementById('clickHint').style.display   = 'block';
  showToast('Loaded: ' + file.name);
}

function pickMatFile(idx) {
  pendingMatCb = file => { scans[idx].matFile = file.name; render(); showToast('Mat: ' + file.name); };
  document.getElementById('matFilePicker').value = '';
  document.getElementById('matFilePicker').click();
}
function onMatPicked(e) {
  const f = e.target.files[0];
  if (f && pendingMatCb) { pendingMatCb(f); pendingMatCb = null; }
}

function pickOutputFolder(idx) {
  pendingFolderCb = path => { scans[idx].outputFolder = path; render(); showToast('Folder set'); };
  document.getElementById('outFolderPicker').value = '';
  document.getElementById('outFolderPicker').click();
}
function onFolderPicked(e) {
  const files = e.target.files;
  if (!files || !files.length || !pendingFolderCb) return;
  pendingFolderCb(files[0].webkitRelativePath.split('/')[0]);
  pendingFolderCb = null;
}

/* ── autofill ── */
function autofillPaths(idx) {
  const baseDir = document.getElementById('baseDir').value.trim();
  if (!baseDir) { showToast('Fill in Base dir first'); return; }
  const sc = scans[idx];
  const name = sc.name || ('s'+(idx+1));
  if (!sc.matFile)      sc.matFile      = `${baseDir}/output_${name}/results/step2_multilabel/paravascular_adc_v2.mat`;
  if (!sc.outputFolder) sc.outputFolder = `${baseDir}/output_${name}/results/step2_multilabel/layout_preview`;
  render();
  showToast('Paths auto-filled');
}

/* ── scan management ── */
function addScan() {
  scans.push({ name: 's'+(scans.length+1), matFile: '', outputFolder: '', segments: [] });
  activeScan = scans.length - 1;
  render();
}
function removeScan(i) {
  if (scans.length <= 1) { showToast('Need at least one scan'); return; }
  scans.splice(i, 1);
  activeScan = Math.min(activeScan, scans.length - 1);
  render();
}
function addSegment() {
  const idIn = document.getElementById('newSegId');
  const id   = idIn ? idIn.value.trim() : '';
  scans[activeScan].segments.push({ id, name: '', trimStart: 3, trimEnd: 3 });
  if (idIn) idIn.value = '';
  render();
  setTimeout(() => {
    const rows = document.querySelectorAll('.seg-row');
    if (rows.length) { const sel = rows[rows.length-1].querySelector('select'); if (sel) sel.focus(); }
  }, 40);
}
function removeSegment(i) {
  scans[activeScan].segments.splice(i, 1);
  render();
}
function updateScan(field, value) { scans[activeScan][field] = value; }
function updateSegment(i, field, value) { scans[activeScan].segments[i][field] = value; }

/* ── render ── */
function nameOptions(current) {
  return VESSEL_NAMES.map(n =>
    `<option value="${n}" ${n===current?'selected':''}>${n||'— pick name —'}</option>`
  ).join('');
}

function render() {
  document.getElementById('scanTabs').innerHTML = scans.map((s,i) => `
    <button class="scan-tab ${i===activeScan?'active':''}" onclick="activeScan=${i};render()">
      ${esc(s.name||'s'+(i+1))}
    </button>
  `).join('');

  const sc = scans[activeScan];
  const ai = activeScan;

  document.getElementById('scanContent').innerHTML = `
    <div class="scan-name-row">
      <label>Scan name</label>
      <input value="${esc(sc.name)}"
        oninput="updateScan('name',this.value);document.querySelectorAll('.scan-tab')[${ai}].textContent=this.value||'s${ai+1}'" />
      ${scans.length > 1
        ? `<button class="btn-icon" onclick="removeScan(${ai})" title="Remove scan">
             <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
               <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>
               <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
             </svg>
           </button>` : ''}
    </div>

    <div class="form-group">
      <label>.mat file</label>
      <div class="input-row">
        <input placeholder="…/step2_multilabel/paravascular_adc_v2.mat"
               value="${esc(sc.matFile)}" oninput="updateScan('matFile',this.value)" />
        <button class="autofill-btn" onclick="pickMatFile(${ai})">Browse</button>
      </div>
    </div>
    <div class="form-group">
      <label>Output folder</label>
      <div class="input-row">
        <input placeholder="…/step2_multilabel/layout_preview"
               value="${esc(sc.outputFolder)}" oninput="updateScan('outputFolder',this.value)" />
        <button class="autofill-btn" onclick="pickOutputFolder(${ai})">Browse</button>
      </div>
    </div>
    <button class="autofill-btn" style="width:100%;padding:6px;margin-bottom:10px;text-align:center"
            onclick="autofillPaths(${ai})">✦ Auto-fill paths from Base dir</button>

    <div class="divider">segments <span class="tag">${sc.segments.length}</span></div>

    <div class="col-headers">
      <span>Segment ID</span>
      <span>Vessel name</span>
      <span>Trim S</span>
      <span>Trim E</span>
      <span></span>
    </div>

    <div class="seg-list">
      ${sc.segments.map((seg, i) => `
        <div class="seg-row" id="segrow-${i}">
          <input placeholder="EP_01—EP_02" value="${esc(seg.id)}"
                 oninput="updateSegment(${i},'id',this.value)" />
          <select onchange="updateSegment(${i},'name',this.value)">${nameOptions(seg.name)}</select>
          <input type="number" min="0" value="${seg.trimStart}"
                 oninput="updateSegment(${i},'trimStart',+this.value)" />
          <input type="number" min="0" value="${seg.trimEnd}"
                 oninput="updateSegment(${i},'trimEnd',+this.value)" />
          <button class="btn-icon" onclick="removeSegment(${i})" title="Remove">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
      `).join('')}
    </div>

    <div class="add-row">
      <input id="newSegId" placeholder="Or paste segment ID manually, press Enter"
             onkeydown="if(event.key==='Enter')addSegment()" />
      <button onclick="addSegment()">+ add</button>
    </div>
  `;
}

/* ── export ── */
function buildConfig() {
  const caseId  = document.getElementById('caseId').value.trim() || 'case';
  const baseDir = document.getElementById('baseDir').value.trim();
  const config  = { case_id: caseId, base_dir: baseDir, scans: {} };
  scans.forEach((sc, i) => {
    const key = sc.name || ('s'+(i+1));
    config.scans[key] = {
      name: sc.name, mat_file: sc.matFile, output_folder: sc.outputFolder,
      segments_of_interest: sc.segments.map(seg => ({
        seg_id: seg.id, name: seg.name,
        trim_start: Number(seg.trimStart), trim_end: Number(seg.trimEnd)
      }))
    };
  });
  return config;
}

function saveConfig() {
  const config = buildConfig();
  const json   = JSON.stringify(config, null, 2);
  const blob   = new Blob([json], { type: 'application/json' });
  const url    = URL.createObjectURL(blob);
  const a      = document.createElement('a');
  a.href = url; a.download = `case_config_${config.case_id}.json`;
  a.click(); URL.revokeObjectURL(url);
  showToast('Saved case_config_' + config.case_id + '.json');
}

function copyConfig() {
  const json = JSON.stringify(buildConfig(), null, 2);
  navigator.clipboard.writeText(json)
    .then(() => showToast('JSON copied'))
    .catch(() => showToast('Copy failed — try Save instead'));
}

render();
</script>
</body>
</html>
